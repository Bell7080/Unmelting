<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      모바일 가로 모드(PC 비율로 테스트)를 가정한 viewport 설정.
      - viewport-fit=cover: 노치/홈바 영역까지 게임 화면이 덮인다(데스크탑엔 무영향).
      - user-scalable=no + maximum-scale=1: 모바일에서 더블탭/핀치 줌으로 게임 UI가
        멋대로 확대돼 비율이 깨지는 사고 방지.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
    <!-- iOS 사파리 풀스크린에서 status bar 영역까지 어둡게 통일. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#14101c" />
    <title>Unmelting - Card Rain Roguelike</title>
    <style>
      :root {
        /* Typography: Minimum 12px enforced */
        --font-size-base: clamp(13px, 1.6vw, 16px);
        --font-size-sm: clamp(12px, 1.3vw, 14px);
        --font-size-lg: clamp(15px, 2vw, 20px);
        --font-size-xl: clamp(18px, 2.5vw, 28px);

        /* Candle/Wax/Fairy-tale palette */
        --color-bg-primary: #14101c;     /* deep night - damp dark forest */
        --color-bg-secondary: #1f1830;   /* dim chamber */
        --color-bg-tertiary: #2a2240;    /* card shelf */
        --color-text-primary: #f3e3c2;   /* warm cream / candlelight */
        --color-text-muted: #a89888;     /* old paper text */
        --color-text-dark: #2a1f14;      /* ink on parchment */

        /* Candlelight */
        --color-flame: #ffd778;          /* candle flame */
        --color-flame-warm: #f4a460;     /* warm wax glow */
        --color-flame-deep: #d97a2c;     /* deeper ember */

        /* Card surfaces (parchment / wax tones) */
        --color-parchment: #e8d4ac;      /* aged paper card face */
        --color-parchment-shadow: #c4a878;
        --color-wax-seal: #8b3f2c;       /* sealing wax accent */

        /* Card type accents */
        --color-enemy: #a83a3a;          /* dark blood red */
        --color-trap: #5c3f7a;           /* dusky purple - shadow */
        --color-treasure: #c9a13a;       /* warm gold */

        /* Borders */
        --color-border-soft: #4a3a2a;    /* burnt umber */
        --color-border-warm: #8b6f47;    /* aged brass */

        /* Typography family (FontManager overrides this once OkDanDan loads) */
        --font-family-primary: 'OkDanDan', 'Georgia', 'Times New Roman', serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-family-primary);
        font-size: var(--font-size-base);
        color: var(--color-text-primary);
        background:
          radial-gradient(ellipse at top, #1f1830 0%, #14101c 55%, #0a0712 100%);
        background-attachment: fixed;
        line-height: 1.5;
        min-height: 100vh;
        /* 모바일에서 더블탭 zoom 지연(300ms tap delay) 제거 + 카드 클릭 즉시 반응.
           터치 디바이스 전용으로 동작하며 마우스 클릭에는 변화 없음. */
        touch-action: manipulation;
        /* 모바일에서 텍스트 길게 누르면 뜨던 선택/돋보기 UI 차단 — 게임 UX와 충돌. */
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        /* iOS Safari가 가로 모드에서 폰트를 임의로 키우던 거 차단. */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* 가로 모드 모바일에서 위/아래 스크롤로 인한 흔들림 방지. */
        overscroll-behavior: contain;
      }

      #app {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      #game-board { width: 100%; }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* ───────── 모바일 가로(landscape) 미세 보강 ─────────
         PC 데스크탑(넓은 폭)에는 영향 없음. 모바일 가로(폭<=1024px + landscape)에서만
         게임 UI를 viewport에 꽉 차게 잡고, 안전 영역(노치/홈바)을 패딩으로 흡수한다.
         실제 컴포넌트 크기는 기존 clamp(...)이 vw/vh 기반이라 알아서 축소된다. */
      @media (max-width: 1024px) and (orientation: landscape),
             (max-height: 600px) {
        html, body {
          height: 100vh;
          overflow: hidden;
        }
        #app {
          min-height: 100vh;
          height: 100vh;
          /* iOS 노치/홈바 안전영역. 데스크탑은 env() 값이 0이라 영향 없음. */
          padding: env(safe-area-inset-top) env(safe-area-inset-right)
                   env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
      }
      /* 모바일이 세로(portrait)일 때는 "가로로 돌려달라" 안내가 자연스럽지만,
         지금은 기본 텍스트 없이 두고 사용자가 가로로 돌렸을 때 위 분기만 적용한다. */
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
